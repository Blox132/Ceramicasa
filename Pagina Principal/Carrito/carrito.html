</head>

                </ul>
            </div>
        </nav>
    </header>

    <main class="carrito-main">
        <h2>Carrito de Compras</h2>
        
        <div class="carrito-container">
            <div class="carrito-items-section">
                <div id="cartItemsContainer" class="cart-items-container"></div>
            </div>
            
            <div class="carrito-resumen-section">
                <div class="resumen">
                    <h3>Resumen del Pedido</h3>
                    <div class="resumen-details">
                        <div class="resumen-row">
                            <span>Subtotal:</span>
                            <span id="subtotal">$0</span>
                        </div>
                        <div class="resumen-row">
                            <span>Envío:</span>
                            <span id="envio">$0</span>
                        </div>
                        <div class="resumen-row total">
                            <span>Total:</span>
                            <span id="total">$0</span>
                        </div>
                    </div>
                    
                    <div class="formulario-compra">
                        <h4>Método de Pago</h4>
                        <form id="checkoutForm">
                            <div class="payment-methods">
                                <label class="method-option">
                                    <input type="radio" name="payment" value="transferencia" required>
                                    Transferencia Bancaria
                                </label>
                                <label class="method-option">
                                    <input type="radio" name="payment" value="efectivo" required>
                                    Efectivo en Entrega
                                </label>
                            </div>
                            
                             <h4>Información de Facturación</h4>
                            <div class="facturacion-section">
                                <label>Nombre Completo:</label><br>
                                <input type="text" id="factNombre" name="nombre" placeholder="Tu nombre completo" required><br>
                                
                                <label>Correo Electrónico:</label><br>
                                <input type="email" id="factEmail" name="email" placeholder="Tu correo electrónico" required><br>
                                
                                <label>Teléfono (10 dígitos):</label><br>
                                <input type="tel" id="factTelefono" name="telefono" placeholder="Ej: 3015690865" pattern="[0-9]{10}" title="El número de teléfono debe tener exactamente 10 dígitos numéricos" required><br>
                                
                                <label>Dirección:</label><br>
                                <input type="text" id="factDireccion" name="direccion" placeholder="Tu dirección completa" required><br>
                                
                                <label>Ciudad/Municipio:</label><br>
                                <select id="factCiudad" name="ciudad" required style="width: 100%; padding: 8px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #ccc;">
                                    <option value="" disabled selected>Selecciona tu ciudad/municipio</option>
                                    <option value="Bogotá">Bogotá D.C.</option>
                                    <option value="Medellín">Medellín (Antioquia)</option>
                                    <option value="Cali">Cali (Valle del Cauca)</option>
                                    <option value="Barranquilla">Barranquilla (Atlántico)</option>
                                    <option value="Bucaramanga">Bucaramanga (Santander)</option>
                                    <option value="Cartagena">Cartagena (Bolívar)</option>
                                    <option value="Cúcuta">Cúcuta (Norte de Santander)</option>
                                    <option value="Pereira">Pereira (Risaralda)</option>
                                    <option value="Ibagué">Ibagué (Tolima)</option>
                                    <option value="Santa Marta">Santa Marta (Magdalena)</option>
                                    <option value="Manizales">Manizales (Caldas)</option>
                                    <option value="Pastos">Pasto (Nariño)</option>
                                    <option value="Villavicencio">Villavicencio (Meta)</option>
                                    <option value="Neiva">Neiva (Huila)</option>
                                    <option value="Armenia">Armenia (Quindío)</option>
                                    <option value="Valledupar">Valledupar (Cesar)</option>
                                    <option value="Montería">Montería (Córdoba)</option>
                                    <option value="Envigado">Envigado (Antioquia)</option>
                                    <option value="Bello">Bello (Antioquia)</option>
                                    <option value="Itagüí">Itagüí (Antioquia)</option>
                                    <option value="Soledad">Soledad (Atlántico)</option>
                                    <option value="Soacha">Soacha (Cundinamarca)</option>
                                </select><br>
                            </div>
                            
                            <button type="submit" class="btn-finalizar">Finalizar Compra</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        
        <button class="btn-continuar" onclick="continuarCompra()">← Continuar Comprando</button>
    </main>

    <footer>
        <div class="paneldeabajo">

            </div>
        </div>

        <div id="contacto">
            <h3>Dudas y Sugerencias:</h3>
            <label>Correo:</label><br>
            <input type="email" placeholder="Escribe tu correo:"><br>
            <label>Mensaje:</label><br>
            <textarea placeholder="Escribe tu mensaje:"></textarea><br>
