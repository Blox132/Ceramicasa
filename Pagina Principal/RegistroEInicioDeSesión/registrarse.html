            <label for="telefono">Teléfono de contacto:</label><br>
            <input type="tel" id="telefono" name="telefono" placeholder="Escribe tu número" required><br>
            <label for="password">Contraseña:</label><br>
            <input type="password" id="password" name="password" placeholder="Escribe tu contraseña" required><br>
            <button type="submit">Registrarse</button>
            <p class="cambio">Ya tienes cuenta? <a href="iniciarsesion.html">Inicia sesión aqui.</a></p>
